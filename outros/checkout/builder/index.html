<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Builder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .editor-panel {
            width: 400px;
            background: white;
            border-right: 1px solid #e0e0e0;
            overflow-y: auto;
            padding: 20px;
        }

        .preview-panel {
            flex: 1;
            background: #f5f5f5;
            overflow: hidden;
        }

        .preview-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="number"],
        input[type="url"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #4CAF50;
        }

        textarea {
            resize: vertical;
            min-height: 60px;
        }

        .image-upload {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .image-preview {
            width: 60px;
            height: 60px;
            border: 2px dashed #ddd;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }

        .btn-primary:hover {
            background: #45a049;
        }

        .btn-secondary {
            background: #2196F3;
            color: white;
        }

        .btn-secondary:hover {
            background: #0b7dda;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .section:last-child {
            border-bottom: none;
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .testimonial-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .testimonial-item input,
        .testimonial-item textarea {
            margin-bottom: 10px;
        }

        .remove-btn {
            background: #f44336;
            color: white;
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        .add-btn {
            background: #4CAF50;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="editor-panel">
            <h2>🛠️ Checkout Builder</h2>
            
            <div class="section">
                <div class="section-title">Produto</div>
                <div class="form-group">
                    <label>Nome do Produto</label>
                    <input type="text" id="productName" placeholder="Taxa de Cadastro">
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="productDescription" placeholder="Essa taxa será reembolsada 100% após o saque"></textarea>
                </div>
                <div class="form-group">
                    <label>Preço (R$)</label>
                    <input type="number" id="productPrice" step="0.01" placeholder="24.56">
                </div>
                <div class="form-group">
                    <label>URL da Imagem do Produto</label>
                    <input type="url" id="productImage" placeholder="https://...">
                </div>
            </div>

            <div class="section">
                <div class="section-title">Logo & Marca</div>
                <div class="form-group">
                    <label>Nome da Loja</label>
                    <input type="text" id="storeName" placeholder="Tik Tok">
                </div>
                <div class="form-group">
                    <label>URL da Logo</label>
                    <input type="url" id="logoUrl" placeholder="https://...">
                </div>
            </div>

            <div class="section">
                <div class="section-title">Informações da Empresa</div>
                <div class="form-group">
                    <label>CNPJ</label>
                    <input type="text" id="cnpj" placeholder="27.415.911/0001-36">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="text" id="email" placeholder="contato@loja.com">
                </div>
            </div>

            <div class="section">
                <div class="section-title">Depoimentos</div>
                <div id="testimonials"></div>
                <button class="add-btn" onclick="addTestimonial()">+ Adicionar Depoimento</button>
            </div>

            <div class="actions">
                <button class="btn btn-primary" onclick="generateCheckout()">💾 Gerar Checkout</button>
                <button class="btn btn-secondary" onclick="loadExample()">📋 Exemplo</button>
            </div>
        </div>

        <div class="preview-panel">
            <iframe id="preview" class="preview-frame"></iframe>
        </div>
    </div>

    <script src="builder.js"></script>
</body>
</html>
