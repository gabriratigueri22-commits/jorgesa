                    totalValue = order.totalValue;
                    shippingPrice = order.shippingPrice || shippingPrice;
                }
                
                console.log('✅ Dados carregados do orderData existente');
            } else {
                // Criar novo orderData
                orderNumber = generateOrderNumber();
                
                // Calcula subtotal dos produtos
                let subtotal = 0;
                if (cartItems.length > 0) {
                    quantity = cartItems.reduce((sum, item) => sum + (item.quantity || 1), 0);
                    subtotal = cartItems.reduce((sum, item) => sum + ((item.price || 0) * (item.quantity || 1)), 0) / 100;
                    productName = cartItems.map(item => item.name).join(", ");
                } else {
                    quantity = parseInt(localStorage.getItem('cartQuantity')) || 1;
                    subtotal = unitPrice * quantity;
                }
                
                // Calcula total = subtotal + frete
                totalValue = subtotal + shippingPrice;
                
                console.log('💰 Cálculo do total:');
                console.log('  - Subtotal produtos:', subtotal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }));
                console.log('  - Frete:', shippingPrice.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }));
                console.log('  - TOTAL:', totalValue.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }));
                
                // Pegar dados do endereço
                if (addressData) {
                    const address = JSON.parse(addressData);
                    customerName = address.nome;
                    customerEmail = address.email;
                    customerPhone = address.telefone;
                }
                // Pegar CPF
                if (cpfData) {
                    customerCPF = cpfData;
                }
                // Se houver valor do PIX, usa ele como total (sobrescreve o cálculo)
                if (pixData) {
                    const pix = JSON.parse(pixData);
                    if (pix.valor) {
                        totalValue = pix.valor / 100;
                        console.log('💳 Valor do PIX encontrado (sobrescrevendo total):', totalValue.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }));
                    }
                }
                // Salvar orderData completo
                const newOrderData = {
                    orderNumber: orderNumber,
                    date: now.toISOString(),
                    productName: productName,
                    productId: 'aiwa-boombox-plus',
                    quantity: quantity,
                    unitPrice: unitPrice,
                    warrantyPrice: warrantyPrice,
                    shippingPrice: shippingPrice,
                    totalValue: totalValue,
                    customerName: customerName,
                    email: customerEmail,
                    phone: customerPhone,
                    cpf: customerCPF
                };
                if (addressData) {
                    const address = JSON.parse(addressData);
                    newOrderData.address = {
                        street: address.endereco,
                        number: address.numero,
                        complement: address.complemento || '',
                        neighborhood: address.bairro,
                        city: address.cidade,
                        state: address.estado,
                        zipCode: address.cep
                    };
                }
                localStorage.setItem('orderData', JSON.stringify(newOrderData));
                console.log('✅ Novo orderData criado e salvo:', newOrderData);
            }
            
            // Atualizar número do pedido
            document.getElementById('order-number').textContent = orderNumber;
            
            // Criar detalhes do pedido dinamicamente
            const detailsContainer = document.getElementById('order-details-container');
            let detailsHTML = '<h3 class="info-card-title">Detalhes do Pedido</h3>';
            
            if (customerNameVar) {
                detailsHTML += `
                <div class="info-row">
                    <span class="info-label">Cliente:</span>
                    <span class="info-value">${customerNameVar}</span>
                </div>`;
            }
            
            if (customerEmailVar) {
                detailsHTML += `
                <div class="info-row">
                    <span class="info-label">E-mail:</span>
                    <span class="info-value">${customerEmailVar}</span>
                </div>`;
            }
            
            if (customerPhoneVar) {
                detailsHTML += `
                <div class="info-row">
                    <span class="info-label">Telefone:</span>
                    <span class="info-value">${customerPhoneVar}</span>
                </div>`;
            }
            
            if (customerCPFVar) {
                detailsHTML += `
                <div class="info-row">
                    <span class="info-label">CPF:</span>
                    <span class="info-value">${customerCPFVar}</span>
                </div>`;
            }
            
            if (customerAddress) {
                detailsHTML += `
                <div class="info-row">
                    <span class="info-label">Endereço:</span>
                    <span class="info-value">${customerAddress}</span>
                </div>`;
            }
            
            // Exibe todos os produtos do carrinho, se houver
            if (cartItems.length > 0) {
                cartItems.forEach(function(item, idx) {
                    detailsHTML += `
                        <div class="info-row">
                            <span class="info-label">Produto:</span>
                            <span class="info-value">${item.name || 'Produto'}${item.variant ? ' - ' + item.variant : ''}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Quantidade:</span>
                            <span class="info-value">${item.quantity || 1}x</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Valor Unitário:</span>
                            <span class="info-value">${((item.price || 0) / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</span>
                        </div>`;
                });
            } else {
                detailsHTML += `
                    <div class="info-row">
                        <span class="info-label">Produto:</span>
                        <span class="info-value">${productName}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Quantidade:</span>
                        <span class="info-value">${quantity}x</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Valor Unitário:</span>
                        <span class="info-value">${unitPrice.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</span>
                    </div>`;
            }
            
            if (warrantyPrice > 0) {
                detailsHTML += `
                <div class="info-row">
                    <span class="info-label">Garantia Estendida:</span>
                    <span class="info-value">${warrantyPrice.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</span>
                </div>`;
            }
            
            if (shippingPrice > 0) {
                detailsHTML += `
                <div class="info-row">
                    <span class="info-label">${shippingMethod}:</span>
                    <span class="info-value">${shippingPrice.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</span>
                </div>`;
            }
            
            detailsHTML += `
                <div class="info-row">
                    <span class="info-label">Data do Pedido:</span>
                    <span class="info-value">${now.toLocaleDateString('pt-BR', dateOptions)}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Método de Pagamento:</span>
                    <span class="info-value">PIX</span>
                </div>
                <div class="info-row total">
                    <span class="info-label">Total Pago:</span>
                    <span class="info-value">${totalValue.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</span>
                </div>
            `;
            
            detailsContainer.innerHTML = detailsHTML;
            
            // Atualiza informações de entrega se houver endereço
            if (addressData) {
                const address = JSON.parse(addressData);
                const deliveryText = document.querySelector('.delivery-text');
                
                if (deliveryText && address.nome) {
                    deliveryText.innerHTML = `
                        <strong>Entregar para:</strong> ${address.nome}<br>
                        <strong>Endereço:</strong> ${address.endereco}, ${address.numero}${address.complemento ? ', ' + address.complemento : ''}<br>
                        ${address.bairro}, ${address.cidade} - ${address.estado}, ${address.cep}<br>
                        <strong>Telefone:</strong> ${address.telefone}<br>
                        <br>
                        Seu pedido será processado e enviado em até 2 dias úteis. Você receberá o código de rastreamento por e-mail assim que o produto for despachado.
                    `;
                }
            }
        }
        
        // Função para gerar número do pedido
        function generateOrderNumber() {
            const now = new Date();
            const year = now.getFullYear();
            const month = (now.getMonth() + 1).toString().padStart(2, '0');
            const day = now.getDate().toString().padStart(2, '0');
            const random = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
            
            return `#TK-${year}${month}${day}-${random}`;
        }
        
        // Função para limpar dados após um tempo (opcional)
        function scheduleDataCleanup() {
            // Remove dados do localStorage após 24 horas
            setTimeout(() => {
                localStorage.removeItem('pixData');
                // Mantém orderData para histórico
            }, 24 * 60 * 60 * 1000);
        }
        
        // === CÓDIGO ORIGINAL DESATIVADO ===
        // Carrega dados quando a página é carregada
        /*
        document.addEventListener('DOMContentLoaded', function() {
            loadOrderData();
            scheduleDataCleanup();
            
            // Adiciona animação de entrada
            document.querySelector('.container').style.opacity = '0';
            document.querySelector('.container').style.transform = 'translateY(30px)';
            
            setTimeout(() => {
                document.querySelector('.container').style.transition = 'all 0.6s ease';
                document.querySelector('.container').style.opacity = '1';
                document.querySelector('.container').style.transform = 'translateY(0)';
            }, 100);
        });
        */
        
        // Previne voltar para a página anterior
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1);
        };
    </script>
</body>
